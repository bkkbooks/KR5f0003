front:
  text: 太上老君清靜心經上七減集福經附退十老君曰夫道一清一濁一靜一動清靜為本濁動為末故陽清陰濁陽動陰靜男清女濁男動女靜降本流末而生萬物清者濁之源靜者動之基人能清靜天下貴之人神好清而心擾之人心好靜而欲牽之常能遺其欲而心自靜澄其心而神自清自然六欲不生三毒消滅而不能者心未澄欲未遺故也能遣之者內觀於心心無其心外觀於形形無其形遠觀於物物無其物三者莫得唯見於空觀空亦空空無所空既無其無無無亦無湛然常寂寂無其寂無寂寂無俱了無矣欲安能生欲既不生心自靜矣心既自靜神即無擾神既無擾常清靜矣既常清靜及會其道與真道會名為得道雖名得道實無所得既無所得强名為得為化衆生開方便道老君曰道所以能得者其在自心自心得道道不使得得是自得之道不名為得故言實無所得老君曰道不能得者為見有心既見有心則見有身既見其身則見萬物既見萬物則生貪著既生貪者則生煩惱既生煩惱則生妄想妄想既生觸情迷惑便歸濁海流浪生死受地獄苦永與道隔人常清靜則自得道於是而說偈曰
  hash: sha256:d5032f40565b5c4447012a33689797eaad32fc9f2839296a73fa316c1818d4c0
  markers:
