body:
  text: 天尊妙用常眼前舉體動心皆自然息箇動心看動處動處分明無際邊邊際由來本性空非觀心照得虛空自悟因緣無自性翛然直入紫微宫宫中宫外光且明萬法圓中一道平清心清鏡皎無礙無礙無心心自在平等道平無有異天堂地獄誰安置神既內寂不虧盈善惡若空何處生只為凡夫生異見强於地上起縱橫縱橫遮莫千般苦一一諦觀無宰主諦觀無主本無宗只箇因緣即會中中間雖會常無會放會無為任物通若時有人知是經意行住坐卧若能志心念誦深心受持則能滅除無量一切宿障諸惡冤家皆得和合無受苦報邪魔外道道能降伏告諸衆生欲度厄難各巳清净信受奉行太上老君清靜心經
  hash: sha256:29fc40978b7d145244d4e9f443747b16d406be19f3ab53ca7af78b6cf0fd0ec0
