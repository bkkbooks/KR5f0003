front:
  text: 太上老君清静心經上七減集福經附退十老君曰夫道一清一濁一静一動清静爲本濁動爲末故陽清陰濁陽動陰静男清女濁男動女静降本流末而生萬物清者濁之源静者動之基人能清静天下貴之人神好清而心擾之人心好静而欲牽之常能遺其欲而心自静澄其心而神自清自然六欲不生三毒消滅而不能者心未澄欲未遺故也能遣之者内觀於心心無其心外觀於形形無其形遠觀於物物無其物三者莫得唯見於空觀空亦空空無所空既無其無無無亦無湛然常寂寂無其寂無寂寂無俱了無矣欲安能生欲既不生心自静矣心既自静神即無擾神既無擾常清静矣既常清静及會其道與真道會名爲得道雖名得道實無所得既無所得强名爲得爲化衆生開方便道老君曰道所以能得者其在自心自心得道道不使得得是自得之道不名爲得故言實無所得老君曰道不能得者爲見有心既見有心則見有身既見其身則見萬物既見萬物則生貪著既生貪者則生煩惱既生煩惱則生妄想妄想既生觸情迷惑便歸濁海流浪生死受地獄苦永與道隔人常清静則自得道於是而說偈曰
  hash: sha256:eab817f14bd67727686c8632ddb37a675ab96a8ffeefc20a4819a8b112a0b0f5
  markers:
